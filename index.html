<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural History — Virtual Exhibition</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f4f2; }
    canvas { position: fixed; inset: 0; display: block; }

    #ui { position: fixed; inset: 0; pointer-events: none; }

    .museum-header { position: absolute; top: 30px; left: 40px; }
    .museum-sub {
      font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 300;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(30,30,40,0.38); margin-bottom: 7px;
    }
    .museum-title {
      font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400;
      letter-spacing: 0.14em; color: rgba(20,20,30,0.75);
    }
    .header-rule {
      position: absolute; top: 84px; left: 40px; right: 40px;
      height: 1px; background: rgba(0,0,0,0.08);
    }
    #station-counter {
      position: absolute; top: 36px; right: 40px;
      font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase; color: rgba(30,30,40,0.38);
    }
    #info-card {
      position: absolute; bottom: 80px; left: 40px; width: 330px;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(18px);
      border: 1px solid rgba(0,0,0,0.1); padding: 26px 30px 28px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.65s ease, transform 0.65s ease;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    #info-card.visible { opacity: 1; transform: translateY(0); }
    #info-card::before {
      content: ''; position: absolute; top: -1px; left: -1px;
      width: 18px; height: 18px;
      border-top: 2px solid rgba(0,0,0,0.18); border-left: 2px solid rgba(0,0,0,0.18);
    }
    #info-card::after {
      content: ''; position: absolute; bottom: -1px; right: -1px;
      width: 18px; height: 18px;
      border-bottom: 2px solid rgba(0,0,0,0.18); border-right: 2px solid rgba(0,0,0,0.18);
    }
    #exhibit-period {
      font-family: 'Jost', sans-serif; font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(30,30,40,0.42); margin-bottom: 11px;
    }
    #exhibit-title {
      font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400;
      color: rgba(10,10,20,0.88); line-height: 1.25; margin-bottom: 13px;
    }
    #exhibit-desc {
      font-family: 'Jost', sans-serif; font-size: 12.5px; font-weight: 300;
      line-height: 1.78; color: rgba(30,30,40,0.58);
    }
    .dots {
      position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 9px; align-items: center;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(0,0,0,0.15); transition: background 0.4s, transform 0.4s;
    }
    .dot.active { background: rgba(0,0,0,0.65); transform: scale(1.55); }
    .nav-buttons {
      position: absolute; bottom: 24px; right: 40px;
      display: flex; gap: 10px; pointer-events: all;
    }
    .nav-btn {
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.14);
      color: rgba(20,20,30,0.62); font-family: 'Jost', sans-serif;
      font-size: 9px; font-weight: 300; letter-spacing: 0.22em;
      text-transform: uppercase; padding: 10px 20px; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .nav-btn:hover { border-color: rgba(0,0,0,0.4); color: rgba(10,10,20,0.9); background: #fff; }
    .progress-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(0,0,0,0.06);
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,.45));
      transition: width 0.35s ease;
    }
    #phase-label {
      position: absolute; bottom: 34px; left: 40px;
      font-family: 'Jost', sans-serif; font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.25em; text-transform: uppercase; color: rgba(0,0,0,0.28);
      display: flex; align-items: center; gap: 9px;
    }
    .pulse-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(40, 180, 100, 0.8);
      animation: pdot 2.5s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(0.6); }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="museum-header">
    <p class="museum-sub">Virtual Exhibition · Natural Sciences</p>
    <p class="museum-title">Natural History</p>
  </div>
  <div class="header-rule"></div>
  <div id="station-counter">Welcome</div>
  <div id="info-card">
    <p id="exhibit-period"></p>
    <h2 id="exhibit-title"></h2>
    <p id="exhibit-desc"></p>
  </div>
  <div class="dots">
    <div class="dot" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
    <div class="dot" id="dot-5"></div>
  </div>
  <div id="phase-label">
    <span class="pulse-dot"></span>
    <span id="phase-text">Live Tour</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" id="btn-prev">← Prev</button>
    <button class="nav-btn" id="btn-next">Next →</button>
  </div>
  <div class="progress-bar"><div id="progress-fill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";

// ── RENDERER ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f0);
scene.fog = new THREE.Fog(0xf2f2f0, 70, 180);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 250);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── TEXTURES ──────────────────────────────────────────────────
function makeFloorTex() {
  const sz = 512, c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  // Deep blue carpet base
  ctx.fillStyle = '#1a2e52';
  ctx.fillRect(0, 0, sz, sz);
  // Carpet pile — short random fibre strokes
  for (let i = 0; i < 18000; i++) {
    const x = Math.random() * sz, y = Math.random() * sz;
    const len = 1.5 + Math.random() * 2.5;
    const angle = Math.random() * Math.PI * 2;
    const light = Math.random();
    ctx.strokeStyle = light > 0.6
      ? `rgba(80,120,210,${0.12 + Math.random()*0.18})`
      : `rgba(10,20,60,${0.1 + Math.random()*0.14})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle)*len, y + Math.sin(angle)*len);
    ctx.stroke();
  }
  // Subtle sheen variation
  for (let i = 0; i < 2000; i++) {
    const x = Math.random()*sz, y = Math.random()*sz;
    ctx.fillStyle = `rgba(100,160,255,${Math.random()*0.06})`;
    ctx.fillRect(x, y, Math.random()*4+1, 1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6, 28);
  return tex;
}

function makeWallTex() {
  const sz = 256, c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f8f8f6';
  ctx.fillRect(0, 0, sz, sz);
  // Very subtle plaster texture
  for (let i = 0; i < 1200; i++) {
    const v = Math.random() * 6 - 3;
    ctx.fillStyle = v > 0 ? `rgba(255,255,255,${v/200})` : `rgba(0,0,0,${-v/280})`;
    ctx.fillRect(Math.random()*sz, Math.random()*sz, Math.random()*4+1, Math.random()*2+1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 3);
  return tex;
}

function makeCeilTex() {
  const sz = 64, c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, sz, sz);
  return new THREE.CanvasTexture(c);
}

// ── HALL GEOMETRY — square layout ─────────────────────────────
const HALL_W = 68, HALL_H = 13, HALL_Z0 = -8, HALL_L = 68;
const HALL_Z1 = HALL_Z0 + HALL_L;
const HALL_CX = 0, HALL_CZ = HALL_Z0 + HALL_L / 2;  // room centre

const floorTex = makeFloorTex();
const wallTex  = makeWallTex();
const ceilTex  = makeCeilTex();

// Floor — blue carpet
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(HALL_W, HALL_L),
  new THREE.MeshPhongMaterial({ map: floorTex, shininess: 2, specular: 0x000000 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.set(HALL_CX, 0, HALL_CZ);
floor.receiveShadow = true;
scene.add(floor);

// Ceiling — plain white
const ceil = new THREE.Mesh(
  new THREE.PlaneGeometry(HALL_W, HALL_L),
  new THREE.MeshPhongMaterial({ map: ceilTex, color: 0xffffff, shininess: 5 })
);
ceil.rotation.x = Math.PI / 2;
ceil.position.set(HALL_CX, HALL_H, HALL_CZ);
scene.add(ceil);

// White walls — all 4 sides
const wallMat = new THREE.MeshPhongMaterial({ map: wallTex, color: 0xfafaf8, shininess: 12 });
function addWall(w, h, x, y, z, ry) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat.clone());
  m.position.set(x, y, z); m.rotation.y = ry; m.receiveShadow = true;
  scene.add(m);
}
// Left wall
addWall(HALL_L, HALL_H, -HALL_W/2, HALL_H/2, HALL_CZ,  Math.PI/2);
// Right wall
addWall(HALL_L, HALL_H,  HALL_W/2, HALL_H/2, HALL_CZ, -Math.PI/2);
// Back wall (far end)
addWall(HALL_W, HALL_H,  0, HALL_H/2, HALL_Z1, Math.PI);
// Front wall (entrance)
addWall(HALL_W, HALL_H,  0, HALL_H/2, HALL_Z0, 0);

// White baseboard — all 4 walls
const trimMat = new THREE.MeshPhongMaterial({ color: 0xeeeeec, shininess: 20 });
// Side baseboards
[-HALL_W/2+0.1, HALL_W/2-0.1].forEach(x => {
  const trim = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.5, HALL_L), trimMat);
  trim.position.set(x, 0.25, HALL_CZ);
  scene.add(trim);
});
// Front/back baseboards
[HALL_Z0+0.1, HALL_Z1-0.1].forEach(z => {
  const trim = new THREE.Mesh(new THREE.BoxGeometry(HALL_W, 0.5, 0.16), trimMat);
  trim.position.set(0, 0.25, z);
  scene.add(trim);
});


scene.add(new THREE.AmbientLight(0xffffff, 1.8));

// Recessed housing material — dark ring flush with ceiling
const canHousingMat = new THREE.MeshPhongMaterial({ color:0x222222, shininess:10 });
const canInnerMat   = new THREE.MeshStandardMaterial({ color:0x000000, emissive:0xffffff, emissiveIntensity:3.5 });

// 5×5 grid of recessed cans across the square room
for (let fx = -HALL_W/2+9; fx <= HALL_W/2-9; fx += 16) {
  for (let fz = HALL_Z0+9; fz <= HALL_Z1-9; fz += 16) {
    // Dark housing ring recessed into ceiling
    const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.40, 0.40, 0.10, 24), canHousingMat);
    housing.position.set(fx, HALL_H - 0.05, fz);
    scene.add(housing);
    // Bright glowing aperture disc
    const inner = new THREE.Mesh(new THREE.CircleGeometry(0.24, 24), canInnerMat);
    inner.rotation.x = Math.PI / 2;
    inner.position.set(fx, HALL_H - 0.08, fz);
    scene.add(inner);
    // Spotlight downward
    const pl = new THREE.SpotLight(0xfffbe8, 2.2, HALL_H + 1, Math.PI * 0.18, 0.55);
    pl.position.set(fx, HALL_H - 0.1, fz);
    pl.target.position.set(fx, 0, fz);
    pl.castShadow = false;
    scene.add(pl); scene.add(pl.target);
  }
}
// Fill lights to lift shadows in corners
for (let fx = -HALL_W/2+18; fx <= HALL_W/2-18; fx += 28) {
  for (let fz = HALL_Z0+18; fz <= HALL_Z1-18; fz += 28) {
    const fill = new THREE.PointLight(0xffffff, 0.5, 38);
    fill.position.set(fx, HALL_H * 0.6, fz);
    scene.add(fill);
  }
}

// ── EXHIBIT DATA — distributed around all 4 walls ─────────────
const EXHIBITS = [
  { wall:'left',  pos: HALL_CZ-16, title:'Origin of Life',       period:'3.8 Billion Years Ago',          screenBg:'#001a3a', accentColor:0x4488ff, desc:'In the churning oceans of early Earth, organic molecules began to self-replicate. RNA, amino acids, lipid membranes — a chain of accidents that led to every living thing on this planet.' },
  { wall:'left',  pos: HALL_CZ+16, title:'Cambrian Explosion',    period:'541 Million Years Ago',           screenBg:'#0d1a08', accentColor:0x44bb44, desc:'In under 25 million years, almost all major animal body plans appeared simultaneously. Trilobites, ammonites, and the ancestors of vertebrates erupted into a world that had known only simple life.' },
  { wall:'right', pos: HALL_CZ-16, title:'Age of Dinosaurs',      period:'230 — 66 Million Years Ago',     screenBg:'#1a1200', accentColor:0xddaa22, desc:'For 165 million years, dinosaurs dominated every landmass. From the 80-tonne Argentinosaurus to the swift Velociraptor, they were the most successful land animals in Earth\'s history.' },
  { wall:'right', pos: HALL_CZ+16, title:'The Great Extinction',  period:'66 Million Years Ago',            screenBg:'#1a0500', accentColor:0xff4422, desc:'A 10-kilometre asteroid struck the Yucatán Peninsula. The impact vaporised rock, ignited global wildfires, and triggered a years-long winter. Three-quarters of all species perished.' },
  { wall:'back',  pos: -14,        title:'Rise of Mammals',        period:'66 — 2.5 Million Years Ago',    screenBg:'#0f0a00', accentColor:0xcc8833, desc:'The survivors diversified into every niche the dinosaurs had vacated. Whales took to the sea. Horses spread across grasslands. In the forest canopy, a lineage of primates began to change.' },
  { wall:'back',  pos:  14,        title:'Human Evolution',        period:'2.5 Million Years Ago — Present', screenBg:'#080010', accentColor:0x9966ff, desc:'From Australopithecus through Homo habilis to Homo sapiens — a lineage that developed fire, language, art, and the capacity to ask where it came from. We are the universe becoming aware of itself.' },
];

// ── DIGITAL SCREEN BUILDER ─────────────────────────────────────
const screenUpdaters = [];
const frameMat = new THREE.MeshPhongMaterial({ color:0x111111, shininess:80, specular:0x444444 });
const bezelMat = new THREE.MeshPhongMaterial({ color:0x1a1a1a, shininess:55 });

function getWallTransform(d) {
  if (d.wall==='left')  return { wx:-HALL_W/2, wz:d.pos,    ry: Math.PI/2, gx: 1, gz: 0 };
  if (d.wall==='right') return { wx: HALL_W/2, wz:d.pos,    ry:-Math.PI/2, gx:-1, gz: 0 };
  if (d.wall==='back')  return { wx:d.pos,     wz:HALL_Z1,  ry: Math.PI,   gx: 0, gz:-1 };
  return                       { wx:d.pos,     wz:HALL_Z0,  ry: 0,         gx: 0, gz: 1 };
}

function buildScreen(exhibitIndex) {
  const d = EXHIBITS[exhibitIndex];
  const { wx, wz, ry, gx, gz } = getWallTransform(d);

  // Floor-to-ceiling screen — full wall height, 16 units wide
  const SCR_H = HALL_H;        // floor to ceiling
  const SCR_W = 16;            // wide panel
  const SCR_CY = HALL_H / 2;  // centred vertically

  const SW=600, SH=Math.round(600*(SCR_H/SCR_W));
  const offscreen=document.createElement('canvas');
  offscreen.width=SW; offscreen.height=SH;
  const sctx=offscreen.getContext('2d');
  const tex=new THREE.CanvasTexture(offscreen);

  // Screen plane — flush to wall
  const screenMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(SCR_W, SCR_H),
    new THREE.MeshBasicMaterial({map:tex})
  );
  screenMesh.position.set(wx+gx*0.04, SCR_CY, wz+gz*0.04);
  screenMesh.rotation.y=ry; scene.add(screenMesh);

  // Thin aluminium side trim strips (left & right edges only)
  const isLR=(d.wall==='left'||d.wall==='right');
  const trimM=new THREE.MeshPhongMaterial({color:0x1a1a1a,shininess:85});
  [-SCR_W/2, SCR_W/2].forEach(offset => {
    const bar=new THREE.Mesh(new THREE.BoxGeometry(0.08, SCR_H, 0.06), trimM);
    if (isLR) bar.position.set(wx+gx*0.02, SCR_CY, wz+offset);
    else       bar.position.set(wx+offset,  SCR_CY, wz+gz*0.02);
    bar.rotation.y=ry; scene.add(bar);
  });

  // Coloured glow from screen face
  const glow=new THREE.PointLight(d.accentColor, 0.5, 16);
  glow.position.set(wx+gx*2.0, SCR_CY, wz+gz*2.0); scene.add(glow);

  const anim=buildScreenAnimation(exhibitIndex, sctx, SW, SH, d);
  screenUpdaters.push({tex, update:anim, glow});
}

function buildPlaque(idx, wx, wz, ry, gx, gz) {
  const d=EXHIBITS[idx];
  const cw=440,ch=100,c=document.createElement('canvas');
  c.width=cw; c.height=ch;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cw,ch);
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.font='300 11px sans-serif';
  ctx.textAlign='center'; ctx.fillText(d.period.toUpperCase(),cw/2,32);
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.font='italic 32px Georgia';
  ctx.fillText(d.title,cw/2,72);
  const pl=new THREE.Mesh(new THREE.PlaneGeometry(2.5,0.58),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c)}));
  pl.position.set(wx+gx*0.09,4.1,wz+gz*0.09); pl.rotation.y=ry; scene.add(pl);
  const bk=new THREE.Mesh(new THREE.BoxGeometry(2.65,0.68,0.04),new THREE.MeshPhongMaterial({color:0xffffff,shininess:25}));
  bk.position.set(wx+gx*0.06,4.1,wz+gz*0.06); bk.rotation.y=ry; scene.add(bk);
}
// ── SCREEN ANIMATION FUNCTIONS ────────────────────────────────
function buildScreenAnimation(idx, ctx, W, H, d) {
  const bg = d.screenBg;

  // Shared: draw header bar — positioned for tall screen
  function drawHeader() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 80);
    // Large exhibit number
    ctx.fillStyle = `rgba(255,255,255,0.12)`;
    ctx.font = `bold 64px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`${idx+1}`, W - 22, 72);
    // Title
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${d.title.toUpperCase()}`, 26, 40);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.fillText(d.period, 26, 64);
    // Bottom label band
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    ctx.fillRect(0, H - 60, W, 60);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    const desc = d.desc || '';
    ctx.fillText(desc.substring(0, 80) + (desc.length > 80 ? '…' : ''), W/2, H - 32);
    ctx.fillText(desc.substring(80, 160) + (desc.length > 160 ? '…' : ''), W/2, H - 14);
  }

  if (idx === 0) {
    // ORIGIN OF LIFE — animated cell division / bubbles in primordial ocean
    const bubbles = Array.from({length: 28}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: 8 + Math.random()*38, speed: 0.12 + Math.random()*0.2,
      phase: Math.random()*Math.PI*2, hue: 180+Math.random()*60
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // Scan line effect
      for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.fillRect(0, y, W, 2);
      }
      bubbles.forEach(b => {
        b.y -= b.speed;
        if (b.y + b.r < 0) { b.y = H + b.r; b.x = Math.random()*W; }
        const pulse = 1 + 0.06*Math.sin(t*0.001*b.speed*8 + b.phase);
        const gr = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*pulse);
        gr.addColorStop(0, `hsla(${b.hue},80%,70%,0.18)`);
        gr.addColorStop(0.6, `hsla(${b.hue},70%,55%,0.08)`);
        gr.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r*pulse, 0, Math.PI*2);
        ctx.fillStyle = gr; ctx.fill();
        ctx.strokeStyle = `hsla(${b.hue},70%,65%,0.25)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });
      // Central glow
      const cg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 120);
      cg.addColorStop(0, 'rgba(40,140,255,0.12)');
      cg.addColorStop(1, 'transparent');
      ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);
      drawHeader();
    };

  } else if (idx === 1) {
    // CAMBRIAN EXPLOSION — radial burst of creatures from centre
    const spokes = Array.from({length: 24}, (_, i) => ({
      angle: (i/24)*Math.PI*2, len: 40+Math.random()*60, hue: 80+Math.random()*60,
      speed: 0.3+Math.random()*0.4, offset: Math.random()*Math.PI*2
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      const cx=W/2, cy=H/2+20;
      // Pulsing rings
      for (let ring=1; ring<=5; ring++) {
        const r = (ring/5)*(t*0.022 % 200);
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(80,200,80,${0.12*(1-r/200)})`;
        ctx.lineWidth = 1; ctx.stroke();
      }
      spokes.forEach(s => {
        const phase = t*0.0008*s.speed + s.offset;
        const len = s.len * (0.7 + 0.3*Math.sin(phase));
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(s.angle + Math.sin(phase*0.5)*0.15);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -len);
        ctx.strokeStyle = `hsla(${s.hue},70%,55%,0.45)`;
        ctx.lineWidth = 1.5; ctx.stroke();
        // Node at end
        ctx.beginPath(); ctx.arc(0, -len, 3.5, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${s.hue},80%,70%,0.65)`; ctx.fill();
        ctx.restore();
      });
      // Centre pulse
      const cp = ctx.createRadialGradient(cx,cy,0,cx,cy,55);
      cp.addColorStop(0,`rgba(100,220,80,${0.25+0.1*Math.sin(t*0.003)})`);
      cp.addColorStop(1,'transparent');
      ctx.fillStyle=cp; ctx.fillRect(0,0,W,H);
      drawHeader();
    };

  } else if (idx === 2) {
    // AGE OF DINOSAURS — timeline sweep with silhouette footprint
    const particles = Array.from({length: 60}, () => ({
      x: Math.random()*W, y: 60+Math.random()*(H-80),
      vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.18,
      r: 1+Math.random()*2.5, hue: 30+Math.random()*30
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // Amber horizon glow
      const hg = ctx.createLinearGradient(0,H*0.55,0,H);
      hg.addColorStop(0,'rgba(200,100,0,0.18)'); hg.addColorStop(1,'transparent');
      ctx.fillStyle=hg; ctx.fillRect(0,H*0.55,W,H);
      // Ground line
      ctx.strokeStyle='rgba(200,150,40,0.3)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(0,H*0.72); ctx.lineTo(W,H*0.72); ctx.stroke();
      // Particles (spores/dust)
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x<0) p.x=W; if (p.x>W) p.x=0;
        if (p.y<60) p.y=H-40; if (p.y>H-20) p.y=70;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.hue},70%,60%,0.35)`; ctx.fill();
      });
      // Sweeping time-bar
      const sweep = ((t*0.00018) % 1);
      ctx.strokeStyle='rgba(220,170,40,0.55)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sweep*W,56); ctx.lineTo(sweep*W,H-20); ctx.stroke();
      // Geological era labels
      const eras = ['Triassic','Jurassic','Cretaceous'];
      eras.forEach((e,i) => {
        ctx.fillStyle='rgba(220,180,80,0.28)';
        ctx.font='300 11px sans-serif';
        ctx.textAlign='center';
        ctx.fillText(e.toUpperCase(), (i+0.5)*(W/3), H-18);
      });
      drawHeader();
    };

  } else if (idx === 3) {
    // GREAT EXTINCTION — shockwave rings + falling debris
    const debris = Array.from({length:45}, () => ({
      x: Math.random()*W, y: -20-Math.random()*H,
      vx: (Math.random()-0.5)*1.2, vy: 1.5+Math.random()*2.5,
      r: 1.2+Math.random()*3.5, rot: Math.random()*Math.PI*2
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // Red sky gradient
      const sky = ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,240);
      sky.addColorStop(0,`rgba(255,60,0,${0.18+0.06*Math.sin(t*0.0018)})`);
      sky.addColorStop(1,'transparent');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
      // Shockwave rings emanating from impact point
      for (let w=0; w<4; w++) {
        const phase = ((t*0.0007 + w*0.25) % 1);
        const r = phase * 220;
        ctx.beginPath(); ctx.arc(W*0.45, H*0.38, r, 0, Math.PI*2);
        ctx.strokeStyle=`rgba(255,120,30,${0.55*(1-phase)})`;
        ctx.lineWidth=2.5*(1-phase*0.7); ctx.stroke();
      }
      // Falling debris
      debris.forEach(d => {
        d.x+=d.vx; d.y+=d.vy;
        if (d.y>H+20) { d.y=-20; d.x=Math.random()*W; }
        d.rot += 0.04;
        ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.rot);
        ctx.fillStyle=`rgba(255,100,30,0.55)`;
        ctx.fillRect(-d.r,-d.r,d.r*2,d.r*2);
        ctx.restore();
      });
      // Bright flash at impact
      const fl=ctx.createRadialGradient(W*0.45,H*0.38,0,W*0.45,H*0.38,55);
      fl.addColorStop(0,`rgba(255,255,200,${0.3+0.15*Math.sin(t*0.0035)})`);
      fl.addColorStop(1,'transparent');
      ctx.fillStyle=fl; ctx.fillRect(0,0,W,H);
      drawHeader();
    };

  } else if (idx === 4) {
    // RISE OF MAMMALS — migration wave, warm savanna tones
    const herd = Array.from({length:18}, (_, i) => ({
      x: (i/18)*W*1.4-W*0.2, y: H*0.6+Math.random()*30,
      speed: 0.5+Math.random()*0.35, size: 6+Math.random()*8
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // Warm sky
      const sk=ctx.createLinearGradient(0,0,0,H*0.65);
      sk.addColorStop(0,'rgba(40,20,0,1)'); sk.addColorStop(1,`${bg}`);
      ctx.fillStyle=sk; ctx.fillRect(0,0,W,H*0.65);
      // Horizon glow
      const hg=ctx.createLinearGradient(0,H*0.5,0,H*0.72);
      hg.addColorStop(0,`rgba(200,120,20,${0.28+0.08*Math.sin(t*0.0012)})`);
      hg.addColorStop(1,'transparent');
      ctx.fillStyle=hg; ctx.fillRect(0,H*0.5,W,H);
      // Ground
      ctx.fillStyle='rgba(120,70,10,0.3)';
      ctx.fillRect(0,H*0.68,W,H-H*0.68);
      // Moving herd silhouettes
      herd.forEach(h => {
        h.x += h.speed;
        if (h.x > W+h.size*4) h.x = -h.size*4;
        ctx.fillStyle='rgba(60,30,0,0.65)';
        // Body
        ctx.beginPath();
        ctx.ellipse(h.x, h.y, h.size*1.6, h.size*0.85, 0, 0, Math.PI*2);
        ctx.fill();
        // Head
        ctx.beginPath();
        ctx.arc(h.x+h.size*1.5, h.y-h.size*0.3, h.size*0.55, 0, Math.PI*2);
        ctx.fill();
      });
      // Sun
      const sun=ctx.createRadialGradient(W*0.8,H*0.18,0,W*0.8,H*0.18,38);
      sun.addColorStop(0,`rgba(255,220,100,${0.55+0.1*Math.sin(t*0.0015)})`);
      sun.addColorStop(1,'transparent');
      ctx.fillStyle=sun; ctx.fillRect(0,0,W,H);
      drawHeader();
    };

  } else {
    // HUMAN EVOLUTION — DNA double helix + data stream
    const dataLines = Array.from({length:18}, (_, i) => ({
      y: (i/18)*H, speed: 0.3+Math.random()*0.5,
      text: Math.random().toString(36).substring(2,14).toUpperCase(),
      alpha: 0.12+Math.random()*0.22
    }));
    return function(t) {
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // Data stream lines (genomic data feel)
      dataLines.forEach(l => {
        l.y -= l.speed;
        if (l.y < -12) { l.y = H+12; l.text = Math.random().toString(36).substr(2,14).toUpperCase(); }
        ctx.fillStyle=`rgba(160,100,255,${l.alpha})`;
        ctx.font='300 10px monospace';
        ctx.textAlign='left';
        ctx.fillText(l.text, 20, l.y);
      });
      // DNA helix drawn in canvas
      const cx=W/2, amp=60, freq=0.028;
      for (let y=60; y<H-20; y+=2) {
        const phase = y*freq + t*0.0012;
        const x1 = cx + Math.sin(phase)*amp;
        const x2 = cx + Math.sin(phase+Math.PI)*amp;
        const col = `hsl(${260+Math.sin(phase)*30},70%,65%)`;
        ctx.fillStyle=col; ctx.globalAlpha=0.7;
        ctx.beginPath(); ctx.arc(x1,y,2.2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`hsl(${320+Math.sin(phase)*20},65%,60%)`;
        ctx.beginPath(); ctx.arc(x2,y,2.2,0,Math.PI*2); ctx.fill();
        // Rungs every 14px
        if (y%14 < 2) {
          ctx.strokeStyle=`rgba(200,170,255,0.3)`;
          ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
      // Central glow
      const cg=ctx.createRadialGradient(cx,H/2,0,cx,H/2,120);
      cg.addColorStop(0,'rgba(140,80,255,0.1)'); cg.addColorStop(1,'transparent');
      ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);
      drawHeader();
    };
  }
}

// ── VIDEO TABLES ───────────────────────────────────────────────
// Three freestanding interactive display tables in the room centre
const tableUpdaters = [];
const TABLE_CONFIGS = [
  { x: -14, z: HALL_CZ,    title: 'Timeline of Life',   bg: '#0a0a1a' },
  { x:   0, z: HALL_CZ-10, title: 'Continental Drift',  bg: '#001210' },
  { x:  14, z: HALL_CZ,    title: 'Tree of Life',        bg: '#0f0008' },
];
const tableMat  = new THREE.MeshPhongMaterial({ color:0x1c1c1c, shininess:90, specular:0x555555 });
const tableLegM = new THREE.MeshPhongMaterial({ color:0x2a2a2a, shininess:55 });
const tableEdge = new THREE.MeshPhongMaterial({ color:0x111111, shininess:80 });

TABLE_CONFIGS.forEach((cfg, ti) => {
  // Heavy pedestal base — wide flat plate on the floor
  const basePlate = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.12, 3.2), tableMat);
  basePlate.position.set(cfg.x, 0.06, cfg.z); scene.add(basePlate);
  // Base trim edge
  const baseTrim = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.06, 3.4), tableEdge);
  baseTrim.position.set(cfg.x, 0.03, cfg.z); scene.add(baseTrim);
  // Foot ring (larger torus)
  const foot = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.1, 10, 32), tableLegM);
  foot.rotation.x=Math.PI/2; foot.position.set(cfg.x, 0.14, cfg.z); scene.add(foot);
  // Pedestal leg — thicker
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.38, 2.2, 20), tableLegM);
  leg.position.set(cfg.x, 1.2, cfg.z); scene.add(leg);

  // Table top — thin slab
  const top = new THREE.Mesh(new THREE.BoxGeometry(4.8,0.12,3.0), tableMat);
  top.position.set(cfg.x, 2.46, cfg.z); scene.add(top);
  // Edge trim
  const rim = new THREE.Mesh(new THREE.BoxGeometry(5.0,0.06,3.2), tableEdge);
  rim.position.set(cfg.x, 2.4, cfg.z); scene.add(rim);

  // Horizontal screen on tabletop (faces up)
  const TW=512, TH=320;
  const tCanvas=document.createElement('canvas');
  tCanvas.width=TW; tCanvas.height=TH;
  const tctx=tCanvas.getContext('2d');
  const tTex=new THREE.CanvasTexture(tCanvas);

  const tScreen=new THREE.Mesh(
    new THREE.PlaneGeometry(4.5,2.8),
    new THREE.MeshBasicMaterial({map:tTex})
  );
  tScreen.rotation.x=-Math.PI/2;
  tScreen.position.set(cfg.x, 2.53, cfg.z);
  scene.add(tScreen);

  // Subtle underglow from screen
  const tGlow=new THREE.PointLight(0x88ccff,0.3,8);
  tGlow.position.set(cfg.x,1.8,cfg.z); scene.add(tGlow);

  // Build table screen animation
  let tAnim;
  if (ti===0) {
    // TIMELINE: horizontal scrolling geological time bar
    const eras=[
      {name:'Hadean',   col:'#4a2080'},{name:'Archean',  col:'#1a5040'},
      {name:'Proterozoic',col:'#206080'},{name:'Paleozoic',col:'#2a7030'},
      {name:'Mesozoic', col:'#7a6020'},{name:'Cenozoic', col:'#802020'},
    ];
    tAnim=function(t){
      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);
      // Header
      tctx.fillStyle='rgba(255,255,255,0.2)'; tctx.font='bold 11px sans-serif';
      tctx.textAlign='center'; tctx.fillText('GEOLOGICAL TIMELINE',TW/2,22);
      // Era bars
      const scroll=(t*0.00004)%1;
      eras.forEach((e,i)=>{
        const bw=TW/eras.length;
        const bx=((i/eras.length)+scroll)*TW*1.0;
        const bxw=bx%TW;
        tctx.fillStyle=e.col;
        tctx.fillRect(bxw,38,bw-3,TH*0.35);
        if(bxw<TW-4){
          tctx.fillStyle='rgba(255,255,255,0.45)';
          tctx.font='10px sans-serif'; tctx.textAlign='left';
          tctx.fillText(e.name.toUpperCase(),bxw+6,38+TH*0.35/2+4);
        }
      });
      // Pulsing marker
      const mx=TW*0.5;
      tctx.strokeStyle=`rgba(255,255,255,${0.6+0.3*Math.sin(t*0.004)})`;
      tctx.lineWidth=1.5;
      tctx.beginPath(); tctx.moveTo(mx,34); tctx.lineTo(mx,38+TH*0.35+4); tctx.stroke();
      // Scale bar
      tctx.fillStyle='rgba(255,255,255,0.12)'; tctx.fillRect(20,TH*0.62,TW-40,1.5);
      tctx.fillStyle='rgba(255,255,255,0.3)'; tctx.font='9px sans-serif'; tctx.textAlign='left';
      ['4 Ga','3 Ga','2 Ga','1 Ga','Now'].forEach((l,i)=>{
        tctx.fillText(l, 20+i*(TW-40)/4, TH*0.62+14);
      });
      // Live data readout
      tctx.fillStyle='rgba(100,200,255,0.35)'; tctx.font='9px monospace';
      tctx.textAlign='right';
      tctx.fillText(`T: ${(t*0.001).toFixed(2)}s`, TW-16, TH-14);
    };
  } else if (ti===1) {
    // CONTINENTAL DRIFT: animated landmass blobs
    const continents=[
      {x:0.3,y:0.45,rx:0.18,ry:0.14,col:'#1a6030'},{x:0.52,y:0.42,rx:0.1,ry:0.12,col:'#225a20'},
      {x:0.18,y:0.38,rx:0.14,ry:0.1,col:'#1a5028'},{x:0.7,y:0.5,rx:0.08,ry:0.11,col:'#1e5825'},
      {x:0.45,y:0.65,rx:0.12,ry:0.08,col:'#1a5535'},{x:0.62,y:0.32,rx:0.07,ry:0.09,col:'#226030'},
    ];
    tAnim=function(t){
      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);
      tctx.fillStyle='rgba(255,255,255,0.2)'; tctx.font='bold 11px sans-serif';
      tctx.textAlign='center'; tctx.fillText('CONTINENTAL DRIFT',TW/2,22);
      // Ocean
      const oc=tctx.createRadialGradient(TW/2,TH*0.55,0,TW/2,TH*0.55,TH*0.42);
      oc.addColorStop(0,'rgba(20,60,100,0.6)'); oc.addColorStop(1,'transparent');
      tctx.fillStyle=oc; tctx.fillRect(0,30,TW,TH-30);
      // Continents drift
      continents.forEach((c,i)=>{
        const drift=t*0.00006*(i%2===0?1:-0.7);
        const px=(c.x+drift%1)*TW, py=c.y*TH;
        tctx.beginPath();
        tctx.ellipse(px,py,c.rx*TW,c.ry*TH,i*0.4+drift*2,0,Math.PI*2);
        tctx.fillStyle=c.col; tctx.fill();
        tctx.strokeStyle='rgba(100,200,100,0.2)'; tctx.lineWidth=1; tctx.stroke();
      });
      // Lat/lng grid
      tctx.strokeStyle='rgba(100,200,255,0.06)'; tctx.lineWidth=0.5;
      for(let g=0;g<5;g++){
        tctx.beginPath(); tctx.moveTo(0,(g/5)*TH+30); tctx.lineTo(TW,(g/5)*TH+30); tctx.stroke();
        tctx.beginPath(); tctx.moveTo((g/5)*TW,30); tctx.lineTo((g/5)*TW,TH); tctx.stroke();
      }
    };
  } else {
    // TREE OF LIFE: branching clade tree
    tAnim=function(t){
      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);
      tctx.fillStyle='rgba(255,255,255,0.2)'; tctx.font='bold 11px sans-serif';
      tctx.textAlign='center'; tctx.fillText('TREE OF LIFE',TW/2,22);
      // Draw branching tree
      function branch(x,y,angle,len,depth){
        if(depth<0||len<5) return;
        const pulse=1+0.08*Math.sin(t*0.002+depth);
        const ex=x+Math.cos(angle)*len*pulse;
        const ey=y+Math.sin(angle)*len*pulse;
        const hue=200+depth*25;
        tctx.strokeStyle=`hsla(${hue},60%,55%,${0.45+depth*0.06})`;
        tctx.lineWidth=Math.max(0.5,depth*0.55);
        tctx.beginPath(); tctx.moveTo(x,y); tctx.lineTo(ex,ey); tctx.stroke();
        if(depth>0){
          const spread=0.45+0.05*Math.sin(t*0.0008+depth);
          branch(ex,ey,angle-spread,len*0.7,depth-1);
          branch(ex,ey,angle+spread,len*0.7,depth-1);
        }
        if(depth===0){
          tctx.beginPath(); tctx.arc(ex,ey,2.5,0,Math.PI*2);
          tctx.fillStyle=`hsla(${hue+40},70%,70%,0.7)`; tctx.fill();
        }
      }
      branch(TW/2,TH-14,-Math.PI/2,52,5);
    };
  }
  tableUpdaters.push({tex:tTex, update:tAnim, glow:tGlow});
});

  tcc.fillStyle='rgba(255,255,255,0.7)'; tcc.font='bold 22px sans-serif';
  tcc.textAlign='center'; tcc.fillText(cfg.title.toUpperCase(), 256, 40);
  const tcMesh=new THREE.Mesh(new THREE.PlaneGeometry(3.0,0.38),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(tc)}));
  tcMesh.position.set(cfg.x, 2.55, cfg.z+1.92); scene.add(tcMesh);

  // ── Interactive table animations ──────────────────────────────
  let tAnim;
  if (ti===0) {

      {y:0.74,h:0.10,col:'#4a3510',name:'Neogene'},
      {y:0.63,h:0.10,col:'#5a4520',name:'Paleogene'},
      {y:0.52,h:0.10,col:'#4a3a18',name:'Cretaceous'},
      {y:0.41,h:0.10,col:'#5a4a28',name:'Jurassic'},
      {y:0.30,h:0.10,col:'#6a5535',name:'Triassic'},
      {y:0.19,h:0.10,col:'#7a6040',name:'Permian'},
      {y:0.08,h:0.10,col:'#8a7050',name:'Carboniferous'},
    ];
    const fossils=Array.from({length:22},()=>({
      x:Math.random(), layer:Math.floor(Math.random()*8),
      type:Math.floor(Math.random()*3), size:3+Math.random()*7
    }));
    tAnim=function(t){
      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);

      tctx.textAlign='center'; tctx.fillText('STRATIGRAPHIC COLUMN',TW/2,22);
      // Draw layers

        tctx.fillStyle=l.col; tctx.fillRect(40,ly,TW-80,lh);
        // Grain texture
        for(let g=0;g<30;g++){
          tctx.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;
          tctx.fillRect(40+Math.random()*(TW-80), ly+Math.random()*lh, Math.random()*8+2, 1);
        }
        tctx.strokeStyle='rgba(0,0,0,0.3)'; tctx.lineWidth=1;
        tctx.strokeRect(40,ly,TW-80,lh);
        tctx.fillStyle='rgba(255,220,150,0.45)'; tctx.font='9px sans-serif';
        tctx.textAlign='left'; tctx.fillText(l.name, 48, ly+lh-5);
      });
      // Fossils embedded in layers
      fossils.forEach(f=>{

        const pulse=0.85+0.15*Math.sin(t*0.002+f.x*10);
        tctx.strokeStyle=`rgba(255,230,150,${0.5*pulse})`;
        tctx.lineWidth=1;

  } else if (ti===1) {

    tAnim=function(t){

      tctx.textAlign='center'; tctx.fillText('DNA BASE PAIR SEQUENCER',TW/2,22);
      const scroll=Math.floor(t*0.02)%seq.length;

      const bw=(TW-60)/vis;

      for(let i=0;i<vis;i++){

        const wave=Math.sin((i/vis)*Math.PI*2+t*0.003)*28;

      tctx.lineWidth=1.5;

        tctx.fillStyle=cols[b]; tctx.font='10px monospace'; tctx.textAlign='left';
        tctx.fillText(`${b}: ${n}`, 30+i*60, TH-12);
      });

  } else if (ti===2) {

      tctx.textAlign='left';
      ['500 Ma','400 Ma','300 Ma','200 Ma','100 Ma','Now'].forEach((l,i)=>{
        tctx.fillText(l, 24+i*(TW-60)/5, TH-8);
      });
    };
  } else if (ti===3) {
    // CLIMATE HISTORY — temperature anomaly chart
    const pts=Array.from({length:200},(_,i)=>{
      const x=i/200;
      return -2+4*Math.sin(x*Math.PI*3.5)*Math.exp(-x*0.5)
             +1.5*Math.sin(x*Math.PI*12)
             +x*2.5; // recent warming trend
    });
    tAnim=function(t){
      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);
      tctx.fillStyle='rgba(255,255,255,0.15)'; tctx.font='bold 13px sans-serif';
      tctx.textAlign='center'; tctx.fillText('EARTH TEMPERATURE HISTORY (800,000 YEARS)',TW/2,22);
      const cy=TH/2+10, yscale=22;
      // Zero line
      tctx.strokeStyle='rgba(255,255,255,0.12)'; tctx.lineWidth=1;
      tctx.setLineDash([4,4]);
      tctx.beginPath(); tctx.moveTo(30,cy); tctx.lineTo(TW-30,cy); tctx.stroke();
      tctx.setLineDash([]);
      // Temperature curve with heat-cold gradient
      for(let i=1;i<pts.length;i++){
        const x1=30+(i-1)/(pts.length-1)*(TW-60);
        const x2=30+i/(pts.length-1)*(TW-60);
        const y1=cy-pts[i-1]*yscale, y2=cy-pts[i]*yscale;
        const hot=pts[i]>0;
        tctx.strokeStyle=hot?`rgba(255,${100-pts[i]*20},40,0.8)`:`rgba(40,${150+pts[i]*-20},255,0.8)`;
        tctx.lineWidth=1.8;
        tctx.beginPath(); tctx.moveTo(x1,y1); tctx.lineTo(x2,y2); tctx.stroke();
      }
      // Fill under curve
      tctx.beginPath(); tctx.moveTo(30,cy);
      pts.forEach((p,i)=>{ tctx.lineTo(30+i/(pts.length-1)*(TW-60), cy-p*yscale); });
      tctx.lineTo(TW-30,cy); tctx.closePath();
      tctx.fillStyle='rgba(255,100,40,0.06)'; tctx.fill();
      // Animated cursor
      const cx2=30+((t*0.00015)%1)*(TW-60);
      tctx.strokeStyle=`rgba(255,255,100,${0.6+0.3*Math.sin(t*0.004)})`;
      tctx.lineWidth=1;
      tctx.beginPath(); tctx.moveTo(cx2,35); tctx.lineTo(cx2,TH-30); tctx.stroke();
      // Scale labels
      tctx.fillStyle='rgba(255,255,255,0.2)'; tctx.font='9px sans-serif'; tctx.textAlign='right';
      ['+4°C','+2°C','0°C','-2°C','-4°C'].forEach((l,i)=>{ tctx.fillText(l,26,cy-(4-i*2)*yscale+4); });
    };
  } else if (ti===4) {
    // EVOLUTION SIMULATOR — live particle organism sim
    let orgs=Array.from({length:35},()=>({
      x:Math.random()*TW, y:40+Math.random()*(TH-60),

    }));

        tctx.fill();
        // Fitness ring
        tctx.strokeStyle=`hsla(${o.hue},80%,75%,${0.2+o.fitness*0.4})`;
        tctx.lineWidth=0.8; tctx.stroke();
        // Generation label for high-gen orgs
        if(o.gen>8){
          tctx.fillStyle='rgba(255,255,255,0.4)'; tctx.font='7px sans-serif';
          tctx.textAlign='center'; tctx.fillText(`G${o.gen}`,o.x,o.y-o.size-2);
        }
      });
      // Stats
      const avgFit=(orgs.reduce((s,o)=>s+o.fitness,0)/orgs.length).toFixed(2);
      const maxGen=Math.max(...orgs.map(o=>o.gen));
      tctx.fillStyle='rgba(180,150,255,0.4)'; tctx.font='9px monospace'; tctx.textAlign='left';
      tctx.fillText(`POP: ${orgs.length}  AVG FITNESS: ${avgFit}  MAX GEN: ${maxGen}`, 16, TH-10);
    };
  } else {
    // OCEAN ORIGINS — deep sea bioluminescence + hydrothermal vent
    const particles=Array.from({length:60},()=>({
      x:Math.random()*TW, y:40+Math.random()*(TH-50),

    }));
    const creatures=Array.from({length:12},()=>({
      x:Math.random()*TW, y:60+Math.random()*(TH-80),

    }));

      tctx.fillStyle=cfg.bg; tctx.fillRect(0,0,TW,TH);

      const dg=tctx.createLinearGradient(0,0,0,TH);
      dg.addColorStop(0,'rgba(0,15,40,0.6)'); dg.addColorStop(1,'rgba(0,5,15,0.8)');

      vg.addColorStop(0,`rgba(255,140,40,${0.4+0.1*Math.sin(t*0.004)})`);

      tctx.fillStyle='rgba(80,60,40,0.8)';
      tctx.fillRect(vx-12,TH-50,24,50);
      tctx.fillRect(vx-18,TH-55,36,10);
      // Vent particles (superheated water)
      particles.forEach(p=>{
        p.x+=p.vx+(Math.sin(t*0.002+p.y*0.05)*0.3);
        p.y+=p.vy;
        p.life-=0.003;
        if(p.life<=0||p.y<30){ p.x=vx+(Math.random()-0.5)*30; p.y=TH-55; p.life=0.8+Math.random()*0.2; }
        const gr=tctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);
        gr.addColorStop(0,`hsla(${p.hue},80%,70%,${p.life*0.6})`);
        gr.addColorStop(1,'transparent');
        tctx.fillStyle=gr; tctx.beginPath();
        tctx.arc(p.x,p.y,p.size*2,0,Math.PI*2); tctx.fill();
      });
      // Bioluminescent creatures
      creatures.forEach(c=>{
        c.x+=c.vx; c.y+=c.vy;
        if(c.x<10||c.x>TW-10) c.vx*=-1;
        if(c.y<38||c.y>TH-20) c.vy*=-1;
        const glow=0.4+0.3*Math.sin(t*0.002+c.phase);
        const cg2=tctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.size*2);
        cg2.addColorStop(0,`hsla(${c.hue},90%,75%,${glow})`);
        cg2.addColorStop(1,'transparent');
        tctx.fillStyle=cg2; tctx.beginPath();
        tctx.ellipse(c.x,c.y,c.size*1.8,c.size*0.7,Math.sin(t*0.001+c.phase)*0.3,0,Math.PI*2);
        tctx.fill();
        // Tentacles
        for(let i=0;i<4;i++){
          tctx.strokeStyle=`hsla(${c.hue},70%,60%,${glow*0.5})`;
          tctx.lineWidth=0.8;
          tctx.beginPath();
          tctx.moveTo(c.x+(i-1.5)*c.size*0.5, c.y+c.size*0.5);
          tctx.quadraticCurveTo(
            c.x+(i-1.5)*c.size*0.5+Math.sin(t*0.003+i)*3,
            c.y+c.size*1.8,
            c.x+(i-1.5)*c.size*0.5+Math.sin(t*0.002+i)*5,
            c.y+c.size*2.8
          );
          tctx.stroke();
        }
      });
    };
  }
  exTabUpdaters.push({tex:tTex, update:tAnim, glow:tGlow});
});

let wpIdx=0, phase='viewing', timer=0;
const fromPos=waypoints[0].pos.clone(), fromTarget=waypoints[0].target.clone();
camera.position.copy(waypoints[0].pos);
camera.lookAt(waypoints[0].target);

const VIEW_DUR=9000, INTRO_DUR=3000, TRANS_DUR=3500;
const _lp=new THREE.Vector3(), _lt=new THREE.Vector3();
function ease(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

function stepTour(dt) {
  timer+=dt;
  if (phase==='viewing') {
    camera.position.copy(waypoints[wpIdx].pos);
    camera.lookAt(waypoints[wpIdx].target);
    const dur = wpIdx===0 ? INTRO_DUR : VIEW_DUR;
    if (timer>=dur) {
      fromPos.copy(waypoints[wpIdx].pos);
      fromTarget.copy(waypoints[wpIdx].target);
      wpIdx=(wpIdx+1)%waypoints.length;
      phase='transitioning'; timer=0;
    }
  } else {
    const t=Math.min(timer/TRANS_DUR,1.0);
    _lp.lerpVectors(fromPos,waypoints[wpIdx].pos,ease(t));
    _lt.lerpVectors(fromTarget,waypoints[wpIdx].target,ease(t));
    camera.position.copy(_lp);
    camera.lookAt(_lt);
    if (t>=1.0){ phase='viewing'; timer=0; updateUI(waypoints[wpIdx].stationIdx); }
  }
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (phase==='viewing') { fromPos.copy(waypoints[wpIdx].pos); fromTarget.copy(waypoints[wpIdx].target); wpIdx=(wpIdx+1)%waypoints.length; phase='transitioning'; timer=0; }
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (phase==='viewing') { fromPos.copy(waypoints[wpIdx].pos); fromTarget.copy(waypoints[wpIdx].target); wpIdx=(wpIdx-1+waypoints.length)%waypoints.length; phase='transitioning'; timer=0; }
});

// ── UI UPDATE ──────────────────────────────────────────────────
function updateUI(idx) {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  const titleEl=document.getElementById('exhibit-title');
  const periodEl=document.getElementById('exhibit-period');
  const descEl=document.getElementById('exhibit-desc');
  const ctrEl=document.getElementById('station-counter');
  const phaseEl=document.getElementById('phase-text');
  if (idx===-2) {
    titleEl.textContent='Interactive Table';
    periodEl.textContent='Floor Display';
    descEl.textContent='These freestanding video tables present the geological timeline, continental drift, and the full tree of life — each updating live.';
    ctrEl.textContent='Video Table';
    phaseEl.textContent='Live Tour';
  } else if (idx<0) {
    titleEl.textContent='Natural History';
    periodEl.textContent='A Journey Through 3.8 Billion Years';
    descEl.textContent='Six stations. Four billion years. One unbroken thread of life — from the first self-replicating molecule to the species now gazing back at where it began.';
    ctrEl.textContent=wpIdx>=waypoints.length-1?'End of Tour':'Welcome';
    phaseEl.textContent='Auto Tour';
  } else {
    const d=EXHIBITS[idx];
    titleEl.textContent=d.title; periodEl.textContent=d.period;
    descEl.textContent=d.desc;
    ctrEl.textContent=`Station ${idx+1} of 6`;
    phaseEl.textContent='Live Tour';
  }
  const card=document.getElementById('info-card');
  card.classList.remove('visible');
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('visible')));
}
updateUI(-1);

// ── LOOP ───────────────────────────────────────────────────────
let last=null;
function loop(t) {
  requestAnimationFrame(loop);
  const dt=last?Math.min(t-last,50):16.67;
  last=t;

  stepTour(dt);

  // Update all screen canvases
  screenUpdaters.forEach(s => {
    s.update(t);
    s.tex.needsUpdate=true;
    s.glow.intensity=0.35+0.12*Math.sin(t*0.002);
  });

  // Update video table canvases
  tableUpdaters.forEach(s => {
    s.update(t);
    s.tex.needsUpdate=true;
    s.glow.intensity=0.22+0.1*Math.sin(t*0.0018+1);
  });
  // Update exhibit table canvases
  exTabUpdaters.forEach(s => {
    s.update(t);
    s.tex.needsUpdate=true;
    s.glow.intensity=0.28+0.12*Math.sin(t*0.0022+2);
  });

  // Drift dust
  if (window._dust) {
    const {attr,vv,N}=window._dust, a=attr.array;
    for (let i=0;i<N;i++) {
      a[i*3]+=vv[i*3]; a[i*3+1]+=vv[i*3+1]; a[i*3+2]+=vv[i*3+2];
      if (a[i*3]>HALL_W/2) a[i*3]-=HALL_W;
      if (a[i*3]<-HALL_W/2) a[i*3]+=HALL_W;
      if (a[i*3+1]>HALL_H) a[i*3+1]=0;
      if (a[i*3+1]<0) a[i*3+1]=HALL_H;
      if (a[i*3+2]>HALL_Z1) a[i*3+2]-=HALL_L;
      if (a[i*3+2]<HALL_Z0) a[i*3+2]+=HALL_L;
    }
    attr.needsUpdate=true;
  }

  document.getElementById('progress-fill').style.width=((wpIdx/(waypoints.length-1))*100).toFixed(1)+'%';
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);
