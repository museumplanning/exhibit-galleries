<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum Exhibit Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #111116;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(255,255,255,0.18);
      --text: #e8e8ec;
      --text-dim: rgba(232,232,236,0.38);
      --text-mid: rgba(232,232,236,0.62);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --accent-glow: rgba(200,169,110,0.08);
      --red: #e05a4a;
      --green: #5aaa7a;
      --mono: 'DM Mono', monospace;
      --serif: 'Cormorant Garamond', serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      padding: 22px 36px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 28px;
      background: var(--bg);
    }

    .header-eyebrow {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 400;
    }

    .header-title {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .header-hint {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── LEFT PANEL — OUTLINE EDITOR ── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 28px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .slot-count {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 9px;
      border-radius: 2px;
    }

    /* Museum context field */
    .context-area {
      padding: 20px 28px 0;
      flex-shrink: 0;
    }

    .context-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: block;
    }

    .context-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-mid);
      font-family: var(--mono);
      font-size: 11.5px;
      line-height: 1.6;
      padding: 11px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      height: 58px;
    }

    .context-input:focus {
      border-color: var(--border-active);
      color: var(--text);
    }

    .context-input::placeholder { color: rgba(232,232,236,0.22); }

    /* Outline list */
    .outline-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 28px 16px;
    }

    .outline-scroll::-webkit-scrollbar { width: 3px; }
    .outline-scroll::-webkit-scrollbar-track { background: transparent; }
    .outline-scroll::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      position: relative;
    }

    .item-num {
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.08em;
      width: 18px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 1px;
    }

    .item-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 7px 0 7px 8px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      border-radius: 0;
    }

    .item-input:focus {
      border-bottom-color: var(--accent);
      background: var(--accent-glow);
      padding-left: 12px;
    }

    .item-input::placeholder { color: rgba(232,232,236,0.18); }

    .item-del {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: rgba(224,90,74,0.0);
      font-size: 14px; line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .outline-item:hover .item-del { color: rgba(224,90,74,0.5); }
    .item-del:hover { color: var(--red) !important; }

    /* Slot type badge */
    .slot-badge {
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 2px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .slot-badge.wall { background: rgba(68,136,255,0.12); color: rgba(68,136,255,0.7); }
    .slot-badge.table { background: rgba(90,170,122,0.12); color: rgba(90,170,122,0.7); }
    .slot-badge.video { background: rgba(200,169,110,0.12); color: rgba(200,169,110,0.7); }

    /* Add button */
    .add-row {
      padding: 0 28px 16px;
      flex-shrink: 0;
    }

    .add-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 9px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Generate button */
    .generate-area {
      padding: 16px 28px 22px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .generate-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 3px;
      color: #0c0c0e;
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover { opacity: 0.88; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .generate-btn .spinner {
      display: none;
      width: 12px; height: 12px;
      border: 1.5px solid rgba(12,12,14,0.3);
      border-top-color: rgba(12,12,14,0.9);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .generate-btn.loading .spinner { display: inline-block; }
    .generate-btn.loading .btn-text { opacity: 0.7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RIGHT PANEL — OUTPUT ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-header {
      padding: 16px 28px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .output-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .output-scroll::-webkit-scrollbar { width: 3px; }
    .output-scroll::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 40px;
      opacity: 0.25;
    }

    .empty-text {
      font-family: var(--serif);
      font-size: 18px;
      font-style: italic;
      font-weight: 300;
      opacity: 0.5;
    }

    .empty-sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    /* Exhibit cards */
    .exhibit-cards {
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .exhibit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .exhibit-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--accent));
    }

    .card-slot {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .card-period {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 11.5px;
      line-height: 1.7;
      color: var(--text-mid);
    }

    .card-meta {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .card-tag {
      font-size: 8.5px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
    }

    .color-swatch {
      width: 12px; height: 12px;
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Code output tab */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      flex-shrink: 0;
    }

    .tab {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 10px 0 8px;
      margin-right: 24px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-panel.active { display: flex; }

    pre.code-output {
      flex: 1;
      overflow: auto;
      padding: 20px 28px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.75;
      color: var(--text-mid);
      background: none;
      white-space: pre-wrap;
      word-break: break-all;
    }

    pre.code-output::-webkit-scrollbar { width: 3px; }
    pre.code-output::-webkit-scrollbar-thumb { background: var(--border-active); }

    /* Error toast */
    .error-toast {
      margin: 20px 28px;
      padding: 14px 16px;
      background: rgba(224,90,74,0.1);
      border: 1px solid rgba(224,90,74,0.25);
      border-radius: 3px;
      font-size: 11px;
      color: #e8887a;
      line-height: 1.6;
      display: none;
    }

    .error-toast.visible { display: block; }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <span class="header-eyebrow">Museum OS</span>
    <span class="header-title">Exhibit Outline Editor</span>
    <div class="header-rule"></div>
    <span class="header-hint">15 content slots — 6 wall screens · 6 tables · 3 video tables</span>
  </header>

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-label">Exhibit Outline</span>
      <span class="slot-count" id="slot-count">0 / 15</span>
    </div>

    <div class="context-area">
      <label class="context-label" for="context-input">Museum Context</label>
      <textarea class="context-input" id="context-input"
        placeholder="e.g. A local history museum in Burlington, Vermont. Focus on Abenaki heritage, colonial settlement, and 19th century industry."></textarea>
    </div>

    <div class="outline-scroll" id="outline-list">
      <!-- items injected here -->
    </div>

    <div class="add-row">
      <button class="add-btn" id="add-btn">+ Add Topic</button>
    </div>

    <div class="generate-area">
      <button class="generate-btn" id="generate-btn">
        <span class="spinner"></span>
        <span class="btn-text">Generate Exhibits</span>
      </button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="tab-bar">
      <div class="tab active" data-tab="preview">Preview</div>
      <div class="tab" data-tab="code">JS Config</div>
    </div>

    <div class="tab-panel active" id="tab-preview">
      <div class="output-scroll" id="preview-area">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-text">No exhibits yet</div>
          <div class="empty-sub">Add topics and generate</div>
        </div>
        <div class="exhibit-cards" id="exhibit-cards" style="display:none"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-code">
      <pre class="code-output" id="code-output">// Generated JS config will appear here
// Paste into your museum HTML to update exhibits</pre>
    </div>

    <div class="error-toast" id="error-toast"></div>
  </div>

</div>

<script>
// ── SLOT DEFINITIONS ────────────────────────────────────────────
const SLOT_DEFS = [
  { id: 1,  label: 'Wall Screen 1',  type: 'wall',  placement: "left wall, front" },
  { id: 2,  label: 'Wall Screen 2',  type: 'wall',  placement: "left wall, rear" },
  { id: 3,  label: 'Wall Screen 3',  type: 'wall',  placement: "right wall, front" },
  { id: 4,  label: 'Wall Screen 4',  type: 'wall',  placement: "right wall, rear" },
  { id: 5,  label: 'Wall Screen 5',  type: 'wall',  placement: "back wall, left" },
  { id: 6,  label: 'Wall Screen 6',  type: 'wall',  placement: "back wall, right" },
  { id: 7,  label: 'Exhibit Table 1', type: 'table', placement: "front-left table" },
  { id: 8,  label: 'Exhibit Table 2', type: 'table', placement: "front-center table" },
  { id: 9,  label: 'Exhibit Table 3', type: 'table', placement: "front-right table" },
  { id: 10, label: 'Exhibit Table 4', type: 'table', placement: "rear-left table" },
  { id: 11, label: 'Exhibit Table 5', type: 'table', placement: "rear-center table" },
  { id: 12, label: 'Exhibit Table 6', type: 'table', placement: "rear-right table" },
  { id: 13, label: 'Video Table 1',   type: 'video', placement: "central video table, left" },
  { id: 14, label: 'Video Table 2',   type: 'video', placement: "central video table, center" },
  { id: 15, label: 'Video Table 3',   type: 'video', placement: "central video table, right" },
];

// ── STATE ────────────────────────────────────────────────────────
let topics = [
  "Big Bang & Formation of the Universe",
  "Formation of Earth",
  "Origin of Life",
  "Cambrian Explosion",
  "Age of Dinosaurs",
  "Mass Extinction Event",
  "Rise of Mammals",
  "Ice Age & Megafauna",
  "Human Evolution",
  "Early Human Migration",
  "Agricultural Revolution",
  "Ancient Civilizations",
  "Industrial Revolution",
  "20th Century",
  "The Future of Earth"
];

let generatedExhibits = [];

// ── RENDER OUTLINE ───────────────────────────────────────────────
function renderOutline() {
  const list = document.getElementById('outline-list');
  list.innerHTML = '';

  topics.forEach((topic, i) => {
    const slot = SLOT_DEFS[i] || null;
    const item = document.createElement('div');
    item.className = 'outline-item';

    const badgeType = slot ? slot.type : 'wall';
    const badgeLabel = slot ? slot.type : '—';

    item.innerHTML = `
      <span class="item-num">${i + 1}</span>
      <input class="item-input" type="text" value="${topic}" placeholder="Exhibit topic…" data-index="${i}">
      <span class="slot-badge ${badgeType}">${badgeLabel}</span>
      <button class="item-del" data-index="${i}" title="Remove">×</button>
    `;
    list.appendChild(item);
  });

  // Bind inputs
  list.querySelectorAll('.item-input').forEach(inp => {
    inp.addEventListener('input', e => {
      topics[+e.target.dataset.index] = e.target.value;
      updateSlotCount();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const idx = +e.target.dataset.index;
        topics.splice(idx + 1, 0, '');
        renderOutline();
        // Focus next
        setTimeout(() => {
          const inputs = document.querySelectorAll('.item-input');
          if (inputs[idx + 1]) inputs[idx + 1].focus();
        }, 0);
      }
      if (e.key === 'Backspace' && e.target.value === '' && topics.length > 1) {
        const idx = +e.target.dataset.index;
        topics.splice(idx, 1);
        renderOutline();
        setTimeout(() => {
          const inputs = document.querySelectorAll('.item-input');
          if (inputs[Math.max(0, idx - 1)]) inputs[Math.max(0, idx - 1)].focus();
        }, 0);
      }
    });
  });

  // Bind delete buttons
  list.querySelectorAll('.item-del').forEach(btn => {
    btn.addEventListener('click', e => {
      if (topics.length <= 1) return;
      topics.splice(+btn.dataset.index, 1);
      renderOutline();
    });
  });

  updateSlotCount();
}

function updateSlotCount() {
  const filled = topics.filter(t => t.trim()).length;
  document.getElementById('slot-count').textContent = `${filled} / 15`;
}

// ── ADD TOPIC ────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', () => {
  if (topics.length < 15) {
    topics.push('');
    renderOutline();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.item-input');
      inputs[inputs.length - 1]?.focus();
    }, 0);
  }
});

// ── TABS ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── GENERATE ─────────────────────────────────────────────────────
document.getElementById('generate-btn').addEventListener('click', generateExhibits);

async function generateExhibits() {
  const filledTopics = topics.filter(t => t.trim());
  if (filledTopics.length === 0) return;

  const btn = document.getElementById('generate-btn');
  const errorToast = document.getElementById('error-toast');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Generating…';
  errorToast.classList.remove('visible');

  const context = document.getElementById('context-input').value.trim();
  const slotList = filledTopics.map((topic, i) => {
    const slot = SLOT_DEFS[i];
    return `Slot ${i + 1} (${slot ? slot.label + ', ' + slot.placement : 'extra'}): "${topic}"`;
  }).join('\n');

  const prompt = `You are generating exhibit configuration data for an interactive 3D virtual museum built in Three.js.

${context ? `Museum context: ${context}\n\n` : ''}The museum has these content slots to fill:
${slotList}

For each slot, generate a JSON object with these fields:
- title: Short, striking exhibit title (3-6 words)
- period: Time period or date range (e.g. "3.8 Billion Years Ago" or "1850 — 1920")
- desc: 2-3 sentence description. Evocative, educational, written for museum visitors.
- screenBg: A dark hex color appropriate to the topic's mood (e.g. deep ocean = "#00080f", volcanic = "#1a0500", cosmic = "#00001a")
- accentColor: A hex color (as JS hex integer like 0x4488ff) that represents this exhibit's visual accent
- type: one of "wall", "table", or "video" matching the slot type

Return ONLY a valid JSON array, no explanation, no markdown, no backticks. Just the raw JSON array starting with [ and ending with ].`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('').trim();

    let exhibits;
    try {
      exhibits = JSON.parse(raw);
    } catch(e) {
      // Try to extract JSON array
      const match = raw.match(/\[[\s\S]*\]/);
      if (match) exhibits = JSON.parse(match[0]);
      else throw new Error("Could not parse response as JSON");
    }

    generatedExhibits = exhibits;
    renderPreview(exhibits);
    renderCode(exhibits);

  } catch (err) {
    errorToast.textContent = `Generation failed: ${err.message}. Make sure you're running this from Claude.ai.`;
    errorToast.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Generate Exhibits';
  }
}

// ── RENDER PREVIEW ───────────────────────────────────────────────
function renderPreview(exhibits) {
  const cards = document.getElementById('exhibit-cards');
  const empty = document.getElementById('empty-state');
  empty.style.display = 'none';
  cards.style.display = 'flex';
  cards.innerHTML = '';

  // Switch to preview tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="preview"]').classList.add('active');
  document.getElementById('tab-preview').classList.add('active');

  exhibits.forEach((ex, i) => {
    const slot = SLOT_DEFS[i];
    const accentCss = '#' + (ex.accentColor || 0x888888).toString(16).replace('0x','').padStart(6,'0');
    const card = document.createElement('div');
    card.className = 'exhibit-card';
    card.style.setProperty('--card-accent', accentCss);
    card.style.animationDelay = `${i * 0.04}s`;

    card.innerHTML = `
      <div class="card-slot">${slot ? slot.label + ' · ' + slot.placement : `Slot ${i+1}`}</div>
      <div class="card-title">${ex.title || '—'}</div>
      <div class="card-period">${ex.period || ''}</div>
      <div class="card-desc">${ex.desc || ''}</div>
      <div class="card-meta">
        <span class="card-tag"><span class="color-swatch" style="background:${ex.screenBg || '#000'}"></span>${ex.screenBg || ''}</span>
        <span class="card-tag"><span class="color-swatch" style="background:${accentCss}"></span>${accentCss}</span>
      </div>
    `;
    cards.appendChild(card);
  });
}

// ── RENDER CODE ──────────────────────────────────────────────────
function renderCode(exhibits) {
  // Split into EXHIBITS (wall screens), EXHIBIT_TABLES, TABLE_CONFIGS
  const wallScreens = exhibits.filter((_, i) => SLOT_DEFS[i]?.type === 'wall');
  const exTables    = exhibits.filter((_, i) => SLOT_DEFS[i]?.type === 'table');
  const videoTables = exhibits.filter((_, i) => SLOT_DEFS[i]?.type === 'video');

  const wallPositions = [
    "wall:'left',  pos: HALL_CZ-16",
    "wall:'left',  pos: HALL_CZ+16",
    "wall:'right', pos: HALL_CZ-16",
    "wall:'right', pos: HALL_CZ+16",
    "wall:'back',  pos: -14",
    "wall:'back',  pos:  14",
  ];

  const tablePositions = [
    "x: -18, z: HALL_CZ-14",
    "x:   0, z: HALL_CZ-14",
    "x:  18, z: HALL_CZ-14",
    "x: -18, z: HALL_CZ+14",
    "x:   0, z: HALL_CZ+14",
    "x:  18, z: HALL_CZ+14",
  ];

  const videoPositions = [
    "x: -14, z: HALL_CZ",
    "x:   0, z: HALL_CZ-10",
    "x:  14, z: HALL_CZ",
  ];

  let code = `// ── GENERATED EXHIBITS CONFIG ──────────────────────────────\n`;
  code += `// Paste this into your museum HTML to update exhibit content\n\n`;

  code += `const EXHIBITS = [\n`;
  wallScreens.forEach((ex, i) => {
    const pos = wallPositions[i] || `wall:'left', pos: 0`;
    code += `  { ${pos}, title:'${ex.title}', period:'${ex.period}', screenBg:'${ex.screenBg}', accentColor:${ex.accentColor}, desc:'${(ex.desc||'').replace(/'/g,"\\'")}' },\n`;
  });
  code += `];\n\n`;

  code += `const EXHIBIT_TABLES = [\n`;
  exTables.forEach((ex, i) => {
    const pos = tablePositions[i] || 'x:0, z:0';
    const accent = ex.accentColor || 0x888888;
    code += `  { ${pos}, title:'${ex.title}', bg:'${ex.screenBg}', accent:${accent} },\n`;
  });
  code += `];\n\n`;

  code += `const TABLE_CONFIGS = [\n`;
  videoTables.forEach((ex, i) => {
    const pos = videoPositions[i] || 'x:0, z:0';
    code += `  { ${pos}, title:'${ex.title}', bg:'${ex.screenBg}' },\n`;
  });
  code += `];\n`;

  document.getElementById('code-output').textContent = code;
}

// ── COPY BUTTON ──────────────────────────────────────────────────
document.querySelector('.copy-btn').addEventListener('click', function() {
  const code = document.getElementById('code-output').textContent;
  navigator.clipboard.writeText(code).then(() => {
    this.textContent = 'Copied!';
    this.classList.add('copied');
    setTimeout(() => {
      this.textContent = 'Copy JS';
      this.classList.remove('copied');
    }, 2000);
  });
});

// ── INIT ─────────────────────────────────────────────────────────
renderOutline();
</script>
